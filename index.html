<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Médiathèque</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Médiathèque" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg:        #ffffff;
      --surface:   #f7f7f7;
      --border:    #ebebeb;
      --ink:       #0d0d0d;
      --muted:     #9a9a9a;
      --libre:     #16a34a;   /* vert */
      --open:      #0057ff;   /* bleu électrique */
      --closed:    #c8c8c8;
    }

    html { background: var(--bg); }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      max-width: 390px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: 0 0 env(safe-area-inset-bottom, 32px);
    }

    /* ── HEADER ── */
    .header {
      padding: 52px 24px 0;
    }
    .header-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .header-title {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: -.04em;
      line-height: 1;
    }
    .header-clock {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: .02em;
    }

    /* ── STATUT HERO ── */
    .hero {
      margin: 32px 24px 0;
      border-radius: 20px;
      padding: 28px 24px 24px;
      position: relative;
      overflow: hidden;
    }
    .hero.ouvert-libre { background: var(--libre); }
    .hero.ouvert-open  { background: var(--open);  }
    .hero.ferme        { background: var(--surface); }

    .hero-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(255,255,255,.6);
      margin-bottom: 10px;
    }
    .hero.ferme .hero-eyebrow { color: var(--muted); }

    .hero-status {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -.04em;
      line-height: .95;
      color: #fff;
    }
    .hero.ferme .hero-status { color: var(--ink); }

    .hero-mode {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,.75);
      margin-top: 10px;
      letter-spacing: -.01em;
    }
    .hero.ferme .hero-mode { color: var(--muted); }

    .hero-sub {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,.55);
      margin-top: 4px;
    }
    .hero.ferme .hero-sub { color: var(--muted); }

    /* Badge transition dans la hero card */
    .hero-body {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
    }
    .hero-left { flex: 1; }
    .hero-transition {
      background: var(--open);
      border-radius: 12px;
      padding: 10px 14px;
      text-align: center;
      flex-shrink: 0;
      min-width: 90px;
    }
    .ht-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.7);
      margin-bottom: 4px;
    }
    .ht-value {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.03em;
      line-height: 1;
    }
    .ht-at {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,.7);
      margin-top: 3px;
    }

    /* ── TIMELINE ── */
    .timeline-wrap {
      margin: 28px 24px 0;
    }
    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .timeline-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .timeline-legend {
      display: flex;
      gap: 12px;
    }
    .tl-leg {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .03em;
    }
    .tl-dot {
      width: 8px; height: 8px;
      border-radius: 2px;
    }
    .track-wrap {
      position: relative;
      height: 10px;
      background: var(--border);
      border-radius: 99px;
      overflow: visible;
    }
    .track-seg {
      position: absolute;
      top: 0; height: 100%;
    }
    .track-seg.libre { background: var(--libre); }
    .track-seg.open  { background: var(--open);  }
    .track-seg:first-child { border-radius: 99px 0 0 99px; }
    .track-seg:last-child  { border-radius: 0 99px 99px 0; }
    .track-seg.solo        { border-radius: 99px; }
    .track-now {
      position: absolute;
      top: -5px;
      width: 2px; height: 20px;
      background: var(--ink);
      border-radius: 2px;
      transform: translateX(-50%);
      z-index: 3;
      box-shadow: 0 0 0 2px var(--bg);
    }
    .track-times {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 9px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .02em;
    }

    /* ── TRANSITION PILL ── */
    .transition-pill {
      margin: 16px 24px 0;
      background: var(--surface);
      border-radius: 12px;
      border-left: 3px solid var(--open);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tp-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
    }
    .tp-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--open);
      letter-spacing: -.02em;
    }

    /* ── HORAIRES TABLE ── */
    .schedule-wrap {
      margin: 28px 24px 0;
    }
    .schedule-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .schedule-table {
      width: 100%;
      border-collapse: collapse;
    }
    .schedule-table thead th {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 0 0 10px;
      text-align: left;
      border-bottom: 1.5px solid var(--ink);
    }
    .schedule-table thead th:not(:first-child) { text-align: right; }
    .th-libre { color: var(--libre); }
    .th-open  { color: var(--open);  }

    .schedule-table tbody tr {
      border-bottom: 1px solid var(--border);
    }
    .schedule-table tbody tr:last-child { border-bottom: none; }
    .schedule-table tbody tr.today { background: var(--surface); }
    .schedule-table tbody tr.today td { font-weight: 600; color: var(--ink); }

    .schedule-table tbody td {
      padding: 10px 0;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      vertical-align: middle;
    }
    .schedule-table tbody td:not(:first-child) { text-align: right; }

    .td-day { font-weight: 500; }
    .today .td-day { color: var(--ink); }
    .today-pip {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--ink);
      margin-right: 6px;
      vertical-align: middle;
      position: relative; top: -1px;
    }
    .hours-cell { line-height: 1.6; }
    .cell-closed { color: var(--border); }

    footer {
      margin-top: auto;
      padding: 32px 24px 40px;
      font-size: 10px;
      font-weight: 500;
      color: var(--border);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="header">
  <h1 class="header-title">Médiathèque</h1>
  <p class="header-label">Horaires d'ouverture</p>
  <p class="header-clock" id="clock">—</p>
</div>

<div id="hero" class="hero ferme">
  <p class="hero-eyebrow">En ce moment</p>
  <div class="hero-body">
    <div class="hero-left">
      <div class="hero-status" id="heroStatus">—</div>
      <div class="hero-mode"   id="heroMode"></div>
      <div class="hero-sub"    id="heroSub"></div>
    </div>
    <div class="hero-transition" id="heroTransition" style="display:none">
      <div class="ht-label">Open+ dans</div>
      <div class="ht-value" id="htValue">—</div>
      <div class="ht-at"    id="htAt"></div>
    </div>
  </div>
</div>

<div class="timeline-wrap">
  <div class="timeline-header">
    <span class="timeline-title">Aujourd'hui</span>
    <div class="timeline-legend">
      <span class="tl-leg"><span class="tl-dot" style="background:var(--libre)"></span>Libre</span>
      <span class="tl-leg"><span class="tl-dot" style="background:var(--open)"></span>Open+</span>
    </div>
  </div>
  <div class="track-wrap" id="trackWrap"></div>
  <div class="track-times">
    <span>8h</span><span>11h</span><span>14h</span><span>17h</span><span>20h</span><span>23h</span>
  </div>
</div>



<div class="schedule-wrap">
  <p class="schedule-title">Cette semaine</p>
  <table class="schedule-table">
    <thead>
      <tr>
        <th></th>
        <th class="th-libre">Entrée libre</th>
        <th class="th-open">Open+</th>
      </tr>
    </thead>
    <tbody id="scheduleBody"></tbody>
  </table>
</div>

<footer>Hors vacances d'été · actualisé toutes les 30 s</footer>

<script>
const LIBRE = {
  2: [[10,0,13,0],[14,0,19,0]],
  3: [[10,0,19,0]],
  5: [[10,0,13,0],[14,0,19,0]],
  6: [[10,0,18,0]],
};
const OPEN = {
  1: [[9,0,22,0]],
  2: [[19,0,22,0]],
  3: [[19,0,22,0]],
  4: [[12,0,22,0]],
  5: [[19,0,22,0]],
  6: [[18,0,22,0]],
  0: [[9,0,22,0]],
};
const DAYS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

function mins(h,m){ return h*60+m; }
function fmtH(h,m){ return `${h}h${m===0?'':String(m).padStart(2,'0')}`; }
function fmtDur(d){
  const h=Math.floor(d/60), m=d%60;
  if(!h) return `${m} min`;
  if(!m) return `${h}h`;
  return `${h}h${String(m).padStart(2,'0')}`;
}

function statusNow(schedule, now){
  for(const [hO,mO,hC,mC] of (schedule||[])){
    const s=mins(hO,mO), e=mins(hC,mC);
    if(now>=s && now<e) return {open:true, closesIn:e-now, closeAt:fmtH(hC,mC)};
  }
  for(const [hO,mO] of (schedule||[])){
    const s=mins(hO,mO);
    if(now<s) return {open:false, opensIn:s-now, openAt:fmtH(hO,mO)};
  }
  return {open:false};
}

// ── Timeline ─────────────────────────────────────────────
const TL_START = mins(8,0), TL_END = mins(23,0);
function pct(m){ return Math.max(0,Math.min(100,(m-TL_START)/(TL_END-TL_START)*100)); }

function renderTimeline(day, nowM){
  const libSlots = LIBRE[day]||[], opnSlots = OPEN[day]||[];
  let events=[];
  for(const [hO,mO,hC,mC] of libSlots){
    events.push({t:mins(hO,mO),type:'lib_start'},{t:mins(hC,mC),type:'lib_end'});
  }
  for(const [hO,mO,hC,mC] of opnSlots){
    events.push({t:mins(hO,mO),type:'opn_start'},{t:mins(hC,mC),type:'opn_end'});
  }
  events.sort((a,b)=>a.t-b.t);

  let libOn=false, opnOn=false, segStart=null, segCls=null, segments=[];
  function getClass(){ return libOn?'libre':opnOn?'open':null; }
  function flush(t){
    if(segStart!==null && segCls && t>segStart)
      segments.push({start:segStart,end:t,cls:segCls});
  }
  for(const ev of events){
    const prev=getClass();
    if(ev.type==='lib_start') libOn=true;
    if(ev.type==='lib_end')   libOn=false;
    if(ev.type==='opn_start') opnOn=true;
    if(ev.type==='opn_end')   opnOn=false;
    const next=getClass();
    if(prev!==next){ flush(ev.t); segStart=ev.t; segCls=next; }
  }
  flush(TL_END);

  const track = document.getElementById('trackWrap');
  const total = segments.length;
  track.innerHTML = segments.map((seg,i)=>{
    const l=pct(seg.start), w=pct(seg.end)-l;
    const solo = total===1 ? 'solo' : '';
    return `<div class="track-seg ${seg.cls} ${solo}" style="left:${l}%;width:${w}%"></div>`;
  }).join('');

  if(nowM>=TL_START && nowM<=TL_END){
    const marker = document.createElement('div');
    marker.className='track-now';
    marker.style.left = pct(nowM)+'%';
    track.appendChild(marker);
  }
}

// ── Table horaires ────────────────────────────────────────
function renderTable(){
  const today = new Date().getDay();
  const tbody = document.getElementById('scheduleBody');
  tbody.innerHTML = Array.from({length:7},(_,i)=>{
    const day=(i+1)%7;
    const isToday = day===today;
    const lib = LIBRE[day], opn = OPEN[day];
    const libCell = lib
      ? lib.map(([hO,mO,hC,mC])=>`${fmtH(hO,mO)}–${fmtH(hC,mC)}`).join('<br>')
      : `<span class="cell-closed">—</span>`;
    const opnCell = opn
      ? opn.map(([hO,mO,hC,mC])=>`${fmtH(hO,mO)}–${fmtH(hC,mC)}`).join('<br>')
      : `<span class="cell-closed">—</span>`;
    const pip = isToday ? `<span class="today-pip"></span>` : '';
    return `<tr class="${isToday?'today':''}">
      <td class="td-day">${pip}${DAYS[day]}</td>
      <td class="hours-cell">${libCell}</td>
      <td class="hours-cell">${opnCell}</td>
    </tr>`;
  }).join('');
}

// ── Statut hero ───────────────────────────────────────────
function renderStatus(){
  const now = new Date();
  const day = now.getDay();
  const nowM = now.getHours()*60+now.getMinutes();
  const lib = statusNow(LIBRE[day], nowM);
  const opn = statusNow(OPEN[day],  nowM);
  const isOpen = lib.open || opn.open;

  const hero       = document.getElementById('hero');
  const heroSt     = document.getElementById('heroStatus');
  const heroMode   = document.getElementById('heroMode');
  const heroSub    = document.getElementById('heroSub');
  const heroTrans  = document.getElementById('heroTransition');
  const htValue    = document.getElementById('htValue');
  const htAt       = document.getElementById('htAt');

  heroTrans.style.display = 'none';

  if(isOpen){
    if(lib.open){
      hero.className = 'hero ouvert-libre';
      heroSt.textContent   = 'Ouvert';
      heroMode.textContent = 'Entrée libre';
      // Fermeture réelle = fin Open+ si présent aujourd'hui (actif ou à venir), sinon fin entrée libre
      const hasOpnToday = opn.open || opn.opensIn != null;
      const realCloseAt  = hasOpnToday ? (opn.open ? opn.closeAt  : opn.openAt.replace(/^(\d+)h.*/, (_,h)=>fmtH(22,0))) : lib.closeAt;
      // On recalcule proprement la vraie fin Open+ du jour
      const opnSlots = OPEN[day] || [];
      let lastOpnClose = null;
      for(const [hO,mO,hC,mC] of opnSlots) lastOpnClose = {at: fmtH(hC,mC), in: mins(hC,mC) - nowM};
      const finalCloseAt  = lastOpnClose ? lastOpnClose.at  : lib.closeAt;
      const finalClosesIn = lastOpnClose ? lastOpnClose.in  : lib.closesIn;
      heroSub.textContent  = `Ferme à ${finalCloseAt} · dans ${fmtDur(finalClosesIn)}`;
      if(!opn.open && opn.opensIn!=null){
        heroTrans.style.display = 'block';
        htValue.textContent = fmtDur(opn.opensIn);
        htAt.textContent    = 'à ' + opn.openAt;
      }
    } else {
      hero.className = 'hero ouvert-open';
      heroSt.textContent   = 'Ouvert';
      heroMode.textContent = 'Accès Open+';
      heroSub.textContent  = `Ferme à ${opn.closeAt} · dans ${fmtDur(opn.closesIn)}`;
    }
  } else {
    hero.className = 'hero ferme';
    heroSt.textContent = 'Fermé';
    const nextLib = lib.opensIn!=null?{in:lib.opensIn,at:lib.openAt,type:'libre'}:null;
    const nextOpn = opn.opensIn!=null?{in:opn.opensIn,at:opn.openAt,type:'open'}:null;
    const next = nextLib&&nextOpn
      ? (nextLib.in<=nextOpn.in?nextLib:nextOpn)
      : (nextLib||nextOpn);
    if(next){
      const label = next.type==='libre'?'Entrée libre':'Accès Open+';
      heroMode.textContent = `Prochain : ${label}`;
      heroSub.textContent  = `Ouvre à ${next.at} · dans ${fmtDur(next.in)}`;
    } else {
      heroMode.textContent = '';
      heroSub.textContent  = 'Aucune ouverture aujourd\'hui';
    }
  }

  renderTimeline(day, nowM);
}

function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent =
    `${DAYS[now.getDay()]} · ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

renderTable();
renderStatus();
updateClock();
setInterval(()=>{ renderStatus(); updateClock(); }, 30000);

// PWA — Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(r => console.log('SW enregistré', r.scope))
      .catch(e => console.warn('SW échec', e));
  });
}
</script>
</body>
</html>

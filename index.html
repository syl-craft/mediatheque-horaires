<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Médiathèque — Horaires</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #ffffff;
      --surface:  #f5f5f3;
      --border:   #e5e5e2;
      --libre:    #e8480c;   /* orange vif */
      --open:     #1a56d6;   /* bleu franc */
      --closed:   #6b6b6b;
      --text:     #111111;
      --muted:    #888884;
      --libre-bg: #fff3ee;
      --open-bg:  #eef3ff;
    }

    html { background: var(--bg); }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 24px);
    }

    /* ── Header ── */
    header {
      padding: 36px 20px 24px;
      border-bottom: 2px solid var(--text);
    }
    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -.03em;
      text-transform: uppercase;
    }
    header h1 span {
      display: block;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .live-clock {
      font-family: 'Inter', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
      padding-top: 6px;
      letter-spacing: .04em;
    }

    /* ── Status cards ── */
    .status-area {
      padding: 20px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .status-card {
      border-radius: 12px;
      padding: 18px 20px 16px;
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
    }
    .status-card.libre { background: var(--libre-bg); border-color: var(--libre); }
    .status-card.open  { background: var(--open-bg);  border-color: var(--open);  }
    .status-card.neutral { background: var(--surface); border-color: var(--border); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .card-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .badge-open   { background: var(--libre); color: #fff; }
    .badge-openp  { background: var(--open);  color: #fff; }
    .badge-closed { background: var(--text);  color: #fff; }
    .badge-soon   { background: var(--open-bg); color: var(--open); border: 1px solid var(--open); }

    .card-status-text {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -.02em;
    }
    .card-status-text .accent-libre  { color: var(--libre); }
    .card-status-text .accent-open   { color: var(--open);  }
    .card-status-text .accent-closed { color: var(--closed);}

    .card-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ── Schedule ── */
    .schedule-section {
      padding: 28px 16px 0;
    }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .schedule-block {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .block-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      border-bottom: 2px solid var(--border);
    }
    .block-color {
      width: 10px; height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .block-color.libre { background: var(--libre); }
    .block-color.open  { background: var(--open);  }
    .block-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -.01em;
    }

    .day-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
    }
    .day-row:last-child { border-bottom: none; }
    .day-row.today { background: #fff; }
    .day-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      min-width: 88px;
    }
    .day-row.today .day-name { color: var(--text); font-weight: 700; }
    .today-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--libre);
      margin-right: 6px;
      vertical-align: middle;
    }
    .block-color.open ~ .block-title + .day-row.today .today-dot { background: var(--open); }
    .day-hours {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .day-row.today .day-hours { color: var(--text); font-weight: 600; }
    .day-closed { font-size: 12px; color: var(--border); font-style: italic; }

    footer {
      margin-top: auto;
      padding: 24px 16px 28px;
      text-align: center;
      font-size: 11px;
      color: var(--border);
      line-height: 1.7;
      letter-spacing: .02em;
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1><span>Médiathèque</span>Horaires</h1>
    <div class="live-clock" id="clock">—</div>
  </div>
</header>

<div class="status-area" id="statusArea"></div>

<div class="schedule-section">
  <p class="section-title">Cette semaine</p>
  <div class="schedule-block" id="blockLibre">
    <div class="block-header">
      <span class="block-color libre"></span>
      <span class="block-title">Entrée libre</span>
    </div>
    <div id="scheduleLibre"></div>
  </div>
  <div class="schedule-block" id="blockOpen">
    <div class="block-header">
      <span class="block-color open"></span>
      <span class="block-title">Accès Open+</span>
    </div>
    <div id="scheduleOpen"></div>
  </div>
</div>

<footer>
  Horaires hors vacances d'été<br>Actualisé toutes les 30 s
</footer>

<script>
// 0=dim 1=lun 2=mar 3=mer 4=jeu 5=ven 6=sam
const LIBRE = {
  2: [[10,0,13,0],[14,0,19,0]],
  3: [[10,0,19,0]],
  5: [[10,0,13,0],[14,0,19,0]],
  6: [[10,0,18,0]],
};
const OPEN = {
  1: [[9,0,22,0]],
  2: [[19,0,22,0]],
  3: [[19,0,22,0]],
  4: [[12,0,22,0]],
  5: [[19,0,22,0]],
  6: [[18,0,22,0]],
  0: [[9,0,22,0]],
};
const DAYS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

function mins(h,m){ return h*60+m; }
function fmtH(h,m){ return `${h}h${m===0?'':String(m).padStart(2,'0')}`; }
function fmtDur(d){
  if(d<=0) return '';
  const h=Math.floor(d/60), m=d%60;
  if(!h) return `${m} min`;
  if(!m) return `${h}h`;
  return `${h}h${String(m).padStart(2,'0')}`;
}

function statusNow(schedule, now){
  for(const [hO,mO,hC,mC] of (schedule||[])){
    const s=mins(hO,mO), e=mins(hC,mC);
    if(now>=s && now<e) return {open:true, closesIn:e-now, closeAt:fmtH(hC,mC)};
  }
  for(const [hO,mO] of (schedule||[])){
    const s=mins(hO,mO);
    if(now<s) return {open:false, opensIn:s-now, openAt:fmtH(hO,mO)};
  }
  return {open:false};
}

function renderSchedule(id, schedule, dotColor){
  const el=document.getElementById(id);
  const today=new Date().getDay();
  el.innerHTML = Array.from({length:7},(_,i)=>{
    const day=(i+1)%7;
    const isToday=day===today;
    const slots=schedule[day];
    const hrs=slots?.map(([hO,mO,hC,mC])=>`${fmtH(hO,mO)}–${fmtH(hC,mC)}`).join(' / ');
    return `<div class="day-row${isToday?' today':''}">
      <span class="day-name">${isToday?`<span class="today-dot" style="background:${dotColor}"></span>`:''}${DAYS[day]}</span>
      ${hrs?`<span class="day-hours">${hrs}</span>`:`<span class="day-closed">—</span>`}
    </div>`;
  }).join('');
}

function renderStatus(){
  const now=new Date();
  const day=now.getDay();
  const nowM=now.getHours()*60+now.getMinutes();
  const lib=statusNow(LIBRE[day],nowM);
  const opn=statusNow(OPEN[day],nowM);

  function card(label,status,cls){
    const isLibre=cls==='libre';
    let badge,badgeClass,text,sub;
    if(status.open){
      badge='Ouvert'; badgeClass=isLibre?'badge-open':'badge-openp';
      text=`<span class="accent-${isLibre?'libre':'open'}">Ouvert</span> jusqu'à ${status.closeAt}`;
      sub=`Ferme dans ${fmtDur(status.closesIn)}`;
    } else if(status.opensIn!=null){
      badge='Fermé'; badgeClass='badge-closed';
      text=`<span class="accent-closed">Fermé</span> — ouvre à ${status.openAt}`;
      sub=`Dans ${fmtDur(status.opensIn)}`;
    } else {
      badge='Fermé'; badgeClass='badge-closed';
      text=`<span class="accent-closed">Fermé</span> aujourd'hui`;
      sub=isLibre?'Pas d\'entrée libre ce jour':'Pas d\'accès Open+ ce jour';
    }
    return `<div class="status-card ${cls}">
      <div class="card-header">
        <span class="card-label">${label}</span>
        <span class="badge ${badgeClass}">${badge}</span>
      </div>
      <div class="card-status-text">${text}</div>
      <div class="card-sub">${sub}</div>
    </div>`;
  }

  let transition='';
  if(lib.open && !opn.open && opn.opensIn!=null){
    transition=`<div class="status-card neutral">
      <div class="card-header">
        <span class="card-label">Transition</span>
        <span class="badge badge-soon">Bientôt</span>
      </div>
      <div class="card-status-text">Open+ dans <span class="accent-open">${fmtDur(opn.opensIn)}</span></div>
      <div class="card-sub">À ${opn.openAt}, l'accès devient Open+</div>
    </div>`;
  }

  document.getElementById('statusArea').innerHTML =
    card('Entrée libre', lib, 'libre') +
    card('Accès Open+', opn, 'open') +
    transition;
}

function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent=`${DAYS[now.getDay()]} ${h}:${m}`;
}

renderSchedule('scheduleLibre', LIBRE, '#e8480c');
renderSchedule('scheduleOpen',  OPEN,  '#1a56d6');
renderStatus();
updateClock();
setInterval(()=>{ renderStatus(); updateClock(); }, 30000);
</script>
</body>
</html>
